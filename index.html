<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Undertale Textbox Generator</title>
<style>
body { background:#00ff00; color:white; text-align:center; font-family:sans-serif; }
canvas, video { border:2px solid white; margin-top:10px; }
textarea, input, select, button { margin:5px; padding:5px; }
#tagKey, #cacheViewer { text-align:left; margin:10px auto; width:600px; background:#111; padding:10px; border:1px solid white; }
.cacheItem { display:flex; justify-content:space-between; margin-bottom:5px; border-bottom:1px solid #555; padding-bottom:2px; }
</style>
</head>
<body>

<h1>Undertale Textbox Generator</h1>

<textarea id="text" rows="4" cols="50"></textarea><br>
Portrait: <input type="file" id="portrait"><br>

Font:
<select id="font">
<option value="comic">Pixel Comic Sans</option>
<option value="mono">Determination Mono</option>
<option value="sans">Determination Sans</option>
<option value="papyrus">Pixel Papyrus</option>
</select><br>

Text Size: <input type="number" id="textSize" value="20"><br>
Text Speed: <input type="number" id="textSpeed" value="50"><br>
Background: <input type="color" id="bgColor" value="#00ff00"><br>
Pause Between Boxes: <input type="number" id="pauseBetween" value="500"><br>

<button onclick="cacheTextbox()">Cache Textbox</button>
<button onclick="generateCachedVideo()">Generate Video</button>

<div id="cacheViewer">
<h3>Cached Boxes</h3>
<div id="cacheList"></div>
</div>

<canvas id="canvas" width="600" height="150"></canvas>
<video id="preview" controls></video>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let cachedBoxes = [];

// fonts
const fonts = {
  comic: new FontFace('comic', "url('http://floppydisk-osc.github.io/random-assets/comicSans.otf')"),
  mono: new FontFace('mono', "url('http://floppydisk-osc.github.io/random-assets/DeterminationMonoWebRegular[1].ttf')"),
  sans: new FontFace('sans', "url('http://floppydisk-osc.github.io/random-assets/DeterminationSansWebRegular[1].ttf')"),
  papyrus: new FontFace('papyrus', "url('http://floppydisk-osc.github.io/random-assets/papyrus-pixel-mono[1].otf')")
};

async function loadFonts(){
  for(let k in fonts){
    const f = await fonts[k].load();
    document.fonts.add(f);
  }
}

// cache UI
function updateCacheViewer(){
  const div = document.getElementById("cacheList");
  div.innerHTML='';
  cachedBoxes.forEach((b,i)=>{
    const d = document.createElement("div");
    d.className='cacheItem';
    d.innerHTML = `<span>${b.text.slice(0,40)}</span>
    <button onclick="cachedBoxes.splice(${i},1);updateCacheViewer()">X</button>`;
    div.appendChild(d);
  });
}

// parse
function parseText(text,startX,size){
  let letters=[], x=startX, y=40, lineStart=startX;
  let color='white', wave=false, shake=false;

  let i=0;
  while(i<text.length){
    if(text[i]=='`'){
      i++;
      let tag='';
      while(i<text.length && text[i]!='`'){ tag+=text[i]; i++; }

      if(tag=='Y') color='yellow';
      else if(tag=='W') color='white';
      else if(tag=='R') color='red';
      else if(tag=='N'){ x=lineStart; y+=size+5; }
      else if(tag=='v') wave=true;
      else if(tag=='\\v') wave=false;
      else if(tag=='s') shake=true;
      else if(tag=='\\s') shake=false;
      else if(tag.startsWith('p')) letters.push({pause:parseInt(tag.slice(1))});
      else if(tag.startsWith('c')) color=tag.slice(1);

    } else {
      letters.push({char:text[i],x,y,color,wave,shake});
      x+=size/1.5;
      if(x>canvas.width-20){ x=lineStart; y+=size+5; }
    }
    i++;
  }
  return letters;
}

// cache textbox
async function cacheTextbox(){
  await loadFonts();

  const text = document.getElementById("text").value;
  const file = document.getElementById("portrait").files[0];

  const box = {
    text,
    portrait:null,
    font: document.getElementById("font").value,
    size: parseInt(document.getElementById("textSize").value),
    speed: parseInt(document.getElementById("textSpeed").value),
    bg: document.getElementById("bgColor").value
  };

  if(file){
    const img = new Image();
    img.src = URL.createObjectURL(file);
    img.onload = ()=>{
      box.portrait = img;
      cachedBoxes.push(box);
      updateCacheViewer();
    };
  } else {
    cachedBoxes.push(box);
    updateCacheViewer();
  }
}

// animation
function animateBox(box){
  return new Promise(resolve=>{
    let letters = parseText(box.text, box.portrait?90:20, box.size);
    let index=0;
    let running=true;
    const start = performance.now();

    ctx.font = `${box.size}px ${box.font}`;

    function draw(){
      if(!running) return;

      ctx.fillStyle=box.bg;
      ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.strokeStyle='white';
      ctx.strokeRect(5,5,canvas.width-10,canvas.height-10);

      if(box.portrait) ctx.drawImage(box.portrait,15,30,64,64);

      let t=(performance.now()-start)/1000;

      for(let j=0;j<=index;j++){
        let l=letters[j];
        if(l && l.char){
          let dx=0,dy=0;
          if(l.wave) dy=Math.sin(t*10+j)*5;
          if(l.shake) dx=Math.sin(t*50+j)*2;
          ctx.fillStyle=l.color;
          ctx.fillText(l.char,l.x+dx,l.y+dy);
        }
      }

      requestAnimationFrame(draw);
    }

    draw();

    (async()=>{
      while(index<letters.length){
        let l=letters[index];
        if(l.pause) await new Promise(r=>setTimeout(r,l.pause));
        else await new Promise(r=>setTimeout(r,box.speed));
        index++;
      }

      await new Promise(r=>setTimeout(r,1000));
      running=false;
      resolve();
    })();
  });
}

// generate video
async function generateCachedVideo(){
  if(cachedBoxes.length===0){
    alert("no boxes");
    return;
  }

  await loadFonts();

  let stream = canvas.captureStream(30);
  let chunks=[];

  let rec = new MediaRecorder(stream,{mimeType:'video/webm'});

  rec.ondataavailable=e=>{
    if(e.data.size>0) chunks.push(e.data);
  };

  rec.onstop=()=>{
    let blob=new Blob(chunks,{type:'video/webm'});
    let url=URL.createObjectURL(blob);
    document.getElementById("preview").src=url;

    let a=document.createElement("a");
    a.href=url;
    a.download="undertale.webm";
    a.click();
  };

  rec.start();

  let pause = parseInt(document.getElementById("pauseBetween").value);

  for(let box of cachedBoxes){
    await animateBox(box);
    await new Promise(r=>setTimeout(r,pause));
  }

  await new Promise(r=>setTimeout(r,500));
  rec.stop();
}
</script>
</body>
</html>
